<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating Systems Midterm Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .correct { background-color: #dcfce7; border-color: #22c55e; }
        .incorrect { background-color: #fee2e2; border-color: #ef4444; }
        .feedback { display: none; font-weight: bold; margin-top: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">Operating Systems Midterm Quiz</h1>
            <p class="text-blue-100">Based on Silberschatz, Galvin and Gagne (9th Edition) - Chapters 1 to 4</p>
        </div>

        <div id="quiz-container" class="p-6 md:p-10 space-y-10">
            <!-- Content will be dynamically generated by JavaScript -->
        </div>

        <div class="bg-slate-100 p-6 border-t border-slate-200 text-center">
            <button id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition duration-200">
                Submit Quiz & Get Score
            </button>
            <div id="results-container" class="mt-6 hidden">
                <h2 class="text-2xl font-bold text-slate-800">Your Score: <span id="score-display" class="text-blue-600"></span></h2>
                <p class="text-slate-600 mt-2">Check the questions above to see your mistakes and correct answers.</p>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // CHAPTER 1
            {
                chapter: "Chapter 1: Introduction",
                description: "15 Multiple Choice Questions",
                questions: [
                    { id: "q1", type: "mcq", text: "1. What is the primary role of an Operating System from a system point of view?", options: ["A) To act as a compiler for user programs", "B) To act as a resource allocator and control program", "C) To provide a graphical user interface", "D) To execute batch scripts continuously"], answer: 1 },
                    { id: "q2", type: "mcq", text: "2. Which piece of code is loaded at power-up or reboot and initializes all aspects of the system?", options: ["A) The kernel", "B) The device driver", "C) The bootstrap program", "D) The command interpreter"], answer: 2 },
                    { id: "q3", type: "mcq", text: "3. What mechanism transfers an entire block of data directly to or from its own buffer storage to memory without CPU intervention?", options: ["A) Direct Memory Access (DMA)", "B) Cache memory", "C) Device controller", "D) Interrupt vector"], answer: 0 },
                    { id: "q4", type: "mcq", text: "4. Which of the following storage media is volatile?", options: ["A) Solid-state disks", "B) Main memory", "C) Magnetic tapes", "D) Hard disks"], answer: 1 },
                    { id: "q5", type: "mcq", text: "5. Which system architecture assigns a specific task to each processor rather than having all processors perform all tasks?", options: ["A) Symmetric Multiprocessing", "B) Clustered Systems", "C) Asymmetric Multiprocessing", "D) Single-processor Systems"], answer: 2 },
                    { id: "q6", type: "mcq", text: "6. What is the logical extension of multiprogramming where the CPU switches jobs so frequently that users can interact with each job while it is running?", options: ["A) Batch processing", "B) Asymmetric clustering", "C) Timesharing (Multitasking)", "D) Emulation"], answer: 2 },
                    { id: "q7", type: "mcq", text: "7. In dual-mode operation, which mode protects the operating system from errant users and errant users from each other?", options: ["A) User mode and Kernel mode", "B) Active mode and Passive mode", "C) Program mode and Hardware mode", "D) System mode and Application mode"], answer: 0 },
                    { id: "q8", type: "mcq", text: "8. What mechanism is used by the OS to prevent infinite loops or processes from hogging CPU resources?", options: ["A) Virtual memory", "B) The timer", "C) Spooling", "D) A trap"], answer: 1 },
                    { id: "q9", type: "mcq", text: "9. What type of software-generated interrupt is caused either by an error or a specific user request?", options: ["A) Hardware interrupt", "B) Trap (or exception)", "C) Boot sector", "D) Polling"], answer: 1 },
                    { id: "q10", type: "mcq", text: "10. What kernel data structure provides an O(lg n) search performance?", options: ["A) Singly linked list", "B) Circular linked list", "C) Hash map", "D) Balanced binary search tree"], answer: 3 },
                    { id: "q11", type: "mcq", text: "11. Which computing environment does not distinguish between clients and servers, allowing nodes to act as either or both?", options: ["A) Cloud Computing", "B) Peer-to-Peer (P2P) computing", "C) Client-Server computing", "D) Virtualization"], answer: 1 },
                    { id: "q12", type: "mcq", text: "12. Which OS service manages the logical storage units abstracted from physical properties, allowing users to organize them into directories?", options: ["A) Memory Management", "B) CPU Scheduling", "C) File-System Management", "D) I/O Subsystem"], answer: 2 },
                    { id: "q13", type: "mcq", text: "13. A system with a single foreground process controlled via UI and multiple background processes is characteristic of which computing environment?", options: ["A) Traditional Desktop", "B) Mobile Systems (like early iOS)", "C) Distributed Systems", "D) Real-time Embedded Systems"], answer: 1 },
                    { id: "q14", type: "mcq", text: "14. What does a virtual machine manager (VMM) provide?", options: ["A) Virtualization services to run guest OS natively compiled for a CPU", "B) Emulation for CPUs with a different architecture", "C) High-availability clusters", "D) Open-source licenses"], answer: 0 },
                    { id: "q15", type: "mcq", text: "15. Which of the following principles ensures that the most recent value of a piece of data is used, no matter where it is stored in the storage hierarchy?", options: ["A) Caching", "B) Spooling", "C) Cache coherency", "D) Direct Memory Access"], answer: 2 }
                ]
            },
            // CHAPTER 2
            {
                chapter: "Chapter 2: OS Structures",
                description: "15 Matching Questions",
                questions: [
                    {
                        id: "ch2_match",
                        type: "matching",
                        text: "Match the terms on the left (1-15) with the correct definitions or descriptions on the right (A-O).",
                        terms: [
                            "1. System Call", "2. Command Interpreter (CLI)", "3. Microkernel", "4. Application Programming Interface (API)", "5. Layered Approach",
                            "6. Message Passing", "7. Core Dump", "8. Loadable Kernel Modules", "9. SYSGEN", "10. Policy",
                            "11. Mechanism", "12. System Programs", "13. DTrace", "14. Virtual Machine", "15. Application Programs"
                        ],
                        definitions: [
                            "A. Programs that are run by users and are not typically considered part of the OS (e.g., word processors).",
                            "B. Tool in Solaris, Mac OS X, and FreeBSD that allows live instrumentation on production systems to find bottlenecks.",
                            "C. Determines 'what will be done' in an operating system design.",
                            "D. An OS structure that moves as much from the kernel into user space as possible (e.g., Mach).",
                            "E. A file generated by the failure of an application that captures the memory of the process.",
                            "F. Determines 'how to do something' in an operating system design.",
                            "G. The programming interface to the services provided by the OS, typically written in C or C++.",
                            "H. Software that allows direct command entry to fetch and execute user commands.",
                            "I. Interprocess communication model that is better for exchanging small amounts of data.",
                            "J. Program that obtains information concerning the specific configuration of the hardware system to build a customized kernel.",
                            "K. OS structure where the bottom level is hardware and the highest level is the user interface.",
                            "L. Modern OS structure approach where each core component is separate but can be added to the kernel as needed.",
                            "M. Provide a convenient environment for program development and execution, such as file management and status info.",
                            "N. A set of functions, such as Win32 or POSIX, mostly used by developers instead of writing direct system calls.",
                            "O. Allows an OS to run natively compiled applications within another host OS."
                        ],
                        answer: ["G", "H", "D", "N", "K", "I", "E", "L", "J", "C", "F", "M", "B", "O", "A"]
                    }
                ]
            },
            // CHAPTER 3
            {
                chapter: "Chapter 3: Processes",
                description: "Ordering, True/False, Fill-in-the-Blanks",
                questions: [
                    {
                        id: "ch3_ord",
                        type: "ordering",
                        text: "Arrange the following 5 steps in the correct chronological sequence (1-5) for a CPU Context Switch from Process P0 to Process P1.",
                        items: [
                            "Reload the saved state from PCB1.",
                            "The operating system interrupts Process P0.",
                            "Process P1 begins executing.",
                            "Save the current state of Process P0 into PCB0.",
                            "Process P0 transitions into an idle state while the OS takes control."
                        ],
                        answer: [4, 1, 5, 2, 3] 
                    },
                    { id: "q3_6", type: "tf", text: "6. A program is an active entity, while a process is a passive entity stored on disk.", answer: "False" },
                    { id: "q3_7", type: "tf", text: "7. The short-term scheduler (CPU scheduler) is invoked very frequently and must be fast.", answer: "True" },
                    { id: "q3_8", type: "tf", text: "8. A zombie process is a process that has terminated, but whose parent has not yet called the wait() system call.", answer: "True" },
                    { id: "q3_9", type: "tf", text: "9. Ordinary pipes are bidirectional and can be accessed without a parent-child relationship.", answer: "False" },
                    { id: "q3_10", type: "tf", text: "10. In indirect communication, messages are sent to and received from mailboxes (or ports) rather than directly to processes.", answer: "True" },
                    { id: "q3_11", type: "fill", text: "11. The ____________ is a data structure used by the OS to represent a process, containing information like process state, program counter, and CPU registers.", answer: ["process control block", "pcb", "process control block (pcb)"] },
                    { id: "q3_12", type: "fill", text: "12. During process creation in UNIX, the `______()` system call is used to duplicate the parent process, and it is usually followed by the `exec()` system call.", answer: ["fork"] },
                    { id: "q3_13", type: "fill", text: "13. A process that spends more time doing I/O operations than computations is referred to as an ____________ process.", answer: ["i/o-bound", "i/o bound", "io-bound", "io bound"] },
                    { id: "q3_14", type: "fill", text: "14. The addition of a ____________ scheduler allows the OS to temporarily remove a process from memory and store it on disk (swapping).", answer: ["medium-term", "medium term"] },
                    { id: "q3_15", type: "fill", text: "15. A ____________ is defined as an endpoint for communication in client-server systems, consisting of an IP address concatenated with a port number.", answer: ["socket"] }
                ]
            },
            // CHAPTER 4
            {
                chapter: "Chapter 4: Threads",
                description: "Ordering, True/False, Fill-in-the-Blanks",
                questions: [
                    {
                        id: "ch4_ord",
                        type: "ordering",
                        text: "Arrange the following 5 steps in the correct chronological sequence (1-5) for creating and executing a POSIX Thread (Pthread) in C.",
                        items: [
                            "The parent process calls `pthread_join()` to wait for the thread to exit.",
                            "Declare the thread identifier (`pthread_t`) and thread attributes (`pthread_attr_t`).",
                            "The thread begins control and executes the designated `runner` function.",
                            "Initialize the default thread attributes using `pthread_attr_init()`.",
                            "Create the thread by invoking the `pthread_create()` function."
                        ],
                        answer: [5, 1, 4, 2, 3]
                    },
                    { id: "q4_21", type: "tf", text: "21. According to Amdahl's Law, the serial portion of an application has a disproportionate effect on the performance gained by adding additional processing cores.", answer: "True" },
                    { id: "q4_22", type: "tf", text: "22. The Many-to-One multithreading model allows multiple user threads to run in parallel on a multicore system.", answer: "False" },
                    { id: "q4_23", type: "tf", text: "23. Thread-Local Storage (TLS) is identical to local variables because both are only visible during a single function invocation.", answer: "False" },
                    { id: "q4_24", type: "tf", text: "24. Grand Central Dispatch (GCD) is an Apple technology that uses dispatch queues to execute code blocks concurrently or serially.", answer: "True" },
                    { id: "q4_25", type: "tf", text: "25. In deferred thread cancellation, the target thread is terminated immediately by the OS, regardless of what it is currently processing.", answer: "False" },
                    { id: "q4_26", type: "fill", text: "26. ____________ parallelism involves distributing subsets of the same data across multiple cores to perform the same operation on each core.", answer: ["data"] },
                    { id: "q4_27", type: "fill", text: "27. The ____________ multithreading model maps each user-level thread directly to a separate kernel thread (used by Windows and Linux).", answer: ["one-to-one", "one to one"] },
                    { id: "q4_28", type: "fill", text: "28. A ____________ ____________ is a strategy where a number of threads are created at startup and wait for work, which avoids the overhead of creating a new thread for every request.", answer: ["thread pool"] },
                    { id: "q4_29", type: "fill", text: "29. Scheduler activations use a communication mechanism called ____________ to notify the thread library of kernel events, helping maintain the correct number of kernel threads.", answer: ["upcalls", "upcall"] },
                    { id: "q4_30", type: "fill", text: "30. In Linux, thread creation is handled using the `____________()` system call, which allows a child task to share the address space, open files, and signal handlers of the parent task.", answer: ["clone"] }
                ]
            }
        ];

        const container = document.getElementById('quiz-container');

        // Render Quiz
        quizData.forEach((section, secIndex) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = "mb-10";
            sectionDiv.innerHTML = `
                <h2 class="text-2xl font-bold text-blue-700 border-b-2 border-blue-200 pb-2 mb-2">${section.chapter}</h2>
                <p class="text-slate-500 mb-6 font-medium">${section.description}</p>
            `;

            section.questions.forEach((q) => {
                const qDiv = document.createElement('div');
                qDiv.className = "mb-6 p-4 rounded-lg border border-slate-200 bg-white";
                qDiv.id = `container_${q.id}`;
                
                let content = `<p class="font-bold mb-3">${q.text}</p>`;

                if (q.type === 'mcq') {
                    q.options.forEach((opt, optIndex) => {
                        content += `
                            <label class="flex items-start mb-2 cursor-pointer p-2 rounded hover:bg-slate-50">
                                <input type="radio" name="${q.id}" value="${optIndex}" class="mt-1 mr-3">
                                <span>${opt}</span>
                            </label>
                        `;
                    });
                } 
                else if (q.type === 'tf') {
                    content += `
                        <div class="flex gap-4">
                            <label class="flex items-center cursor-pointer p-2 rounded hover:bg-slate-50"><input type="radio" name="${q.id}" value="True" class="mr-2"> True</label>
                            <label class="flex items-center cursor-pointer p-2 rounded hover:bg-slate-50"><input type="radio" name="${q.id}" value="False" class="mr-2"> False</label>
                        </div>
                    `;
                }
                else if (q.type === 'fill') {
                    content += `<input type="text" id="${q.id}" class="w-full md:w-1/2 p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Type your answer here...">`;
                }
                else if (q.type === 'matching') {
                    content += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">`;
                    // Terms column
                    content += `<div class="space-y-3">`;
                    q.terms.forEach((term, tIdx) => {
                        content += `
                            <div class="flex items-center justify-between bg-slate-50 p-2 rounded border border-slate-200">
                                <span class="text-sm font-medium w-3/4">${term}</span>
                                <select id="${q.id}_${tIdx}" class="border border-slate-300 rounded p-1 w-16 text-center">
                                    <option value="">-</option>
                                    ${"ABCDEFGHIJKLMNO".split('').map(l => `<option value="${l}">${l}</option>`).join('')}
                                </select>
                            </div>
                        `;
                    });
                    content += `</div>`;
                    // Definitions column
                    content += `<div class="space-y-2 text-sm text-slate-700 bg-slate-50 p-4 rounded border border-slate-200">`;
                    q.definitions.forEach(def => {
                        content += `<div class="pb-2 border-b border-slate-200 last:border-0">${def}</div>`;
                    });
                    content += `</div></div>`;
                }
                else if (q.type === 'ordering') {
                    content += `<div class="space-y-2 mt-2">`;
                    q.items.forEach((item, iIdx) => {
                        content += `
                            <div class="flex items-center gap-3 bg-slate-50 p-2 rounded border border-slate-200">
                                <input type="number" min="1" max="5" id="${q.id}_${iIdx}" class="border border-slate-300 rounded p-1 w-16 text-center" placeholder="#">
                                <span class="text-sm">${item}</span>
                            </div>
                        `;
                    });
                    content += `</div>`;
                }

                content += `<div id="feedback_${q.id}" class="feedback"></div>`;
                qDiv.innerHTML = content;
                sectionDiv.appendChild(qDiv);
            });

            container.appendChild(sectionDiv);
        });

        // Grading Logic
        document.getElementById('submit-btn').addEventListener('click', () => {
            let score = 0;
            let total = 60; // 15 mcq + 15 matching + 10 ordering + 10 T/F + 10 fill

            quizData.forEach(section => {
                section.questions.forEach(q => {
                    const container = document.getElementById(`container_${q.id}`);
                    const feedback = document.getElementById(`feedback_${q.id}`);
                    let isCorrect = false;
                    let correctAnsText = "";

                    container.classList.remove('correct', 'incorrect');
                    feedback.style.display = 'block';

                    if (q.type === 'mcq') {
                        const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                        if (selected && parseInt(selected.value) === q.answer) {
                            isCorrect = true;
                            score++;
                        }
                        correctAnsText = `Correct Answer: ${q.options[q.answer]}`;
                    } 
                    else if (q.type === 'tf') {
                        const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                        if (selected && selected.value === q.answer) {
                            isCorrect = true;
                            score++;
                        }
                        correctAnsText = `Correct Answer: ${q.answer}`;
                    }
                    else if (q.type === 'fill') {
                        const inputVal = document.getElementById(q.id).value.trim().toLowerCase();
                        if (q.answer.includes(inputVal)) {
                            isCorrect = true;
                            score++;
                        }
                        correctAnsText = `Accepted Answer(s): ${q.answer.join(" OR ")}`;
                    }
                    else if (q.type === 'matching') {
                        let matchScore = 0;
                        for (let i = 0; i < q.terms.length; i++) {
                            const val = document.getElementById(`${q.id}_${i}`).value;
                            if (val === q.answer[i]) matchScore++;
                        }
                        score += matchScore;
                        if (matchScore === q.terms.length) isCorrect = true;
                        correctAnsText = `Correct Order: ${q.answer.join(", ")}`;
                    }
                    else if (q.type === 'ordering') {
                        let ordScore = 0;
                        for (let i = 0; i < q.items.length; i++) {
                            const val = parseInt(document.getElementById(`${q.id}_${i}`).value);
                            if (val === q.answer[i]) ordScore++;
                        }
                        score += ordScore;
                        if (ordScore === q.items.length) isCorrect = true;
                        correctAnsText = `Correct Sequence: ${q.answer.join(", ")}`;
                    }

                    if (isCorrect || (q.type === 'matching' && score > 0) || (q.type === 'ordering' && score > 0)) {
                        // Partial credit handled nicely by background color
                        container.classList.add(isCorrect ? 'correct' : 'incorrect');
                        feedback.innerHTML = isCorrect ? "✅ Correct!" : `❌ Partially correct / Incorrect.<br><span class="text-slate-600 text-sm font-normal">${correctAnsText}</span>`;
                        feedback.className = `feedback ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
                    } else {
                        container.classList.add('incorrect');
                        feedback.innerHTML = `❌ Incorrect.<br><span class="text-slate-600 text-sm font-normal">${correctAnsText}</span>`;
                        feedback.className = "feedback text-red-600";
                    }
                });
            });

            const resultsContainer = document.getElementById('results-container');
            const scoreDisplay = document.getElementById('score-display');
            
            scoreDisplay.innerText = `${score} / ${total} (${Math.round((score/total)*100)}%)`;
            resultsContainer.classList.remove('hidden');
            
            // Scroll to bottom
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
